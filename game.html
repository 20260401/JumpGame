<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>跳跃小游戏 - 避开障碍物</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .game-container {
            background: #0f0f1a;
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .info {
            text-align: center;
            margin-top: 16px;
            color: #eee;
            font-size: 14px;
        }
        .score {
            font-size: 18px;
            font-weight: bold;
            color: #ffd966;
        }
        .controls {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        button {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        button:active {
            transform: scale(0.96);
            background: #1e2a4a;
        }
        @media (max-width: 600px) {
            .info { font-size: 12px; }
            button { padding: 6px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="info">
            🐸 点击画面 / 空格键 / 点击按钮 → 跳跃 &nbsp;&nbsp;|&nbsp;&nbsp;
            <span class="score">得分: <span id="scoreValue">0</span></span>
        </div>
        <div class="controls">
            <button id="jumpBtn">🐸 跳跃</button>
            <button id="restartBtn">🔄 重新开始</button>
        </div>
    </div>
    <div class="info" style="margin-top: 12px; font-size:12px; opacity:0.7;">
        💡 避开红色障碍物 | 碰到即失败 | 点击画面/空格跳跃
    </div>
</div>

<script>
    (function(){
        // ---------- 画布元素 ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ---------- 游戏常量 ----------
        const W = 800, H = 600;
        const PLAYER_W = 40, PLAYER_H = 40;
        const OBSTACLE_W = 30, OBSTACLE_H = 30;
        const GROUND_Y = H - PLAYER_H;      // 地面高度（玩家底部对齐）
        
        // 物理参数
        const GRAVITY = 1200;          // 重力加速度 (像素/秒²)  手机/桌面都合适
        const JUMP_POWER = -450;       // 跳跃初速度 (向上负值)
        
        // 障碍物移动速度 (像素/秒)
        const OBSTACLE_SPEED = 220;
        // 障碍物间距 (像素)
        const OBSTACLE_SPACING = 380;
        
        // 游戏状态
        let gameRunning = true;     // true: 游戏中, false: 游戏结束
        let score = 0;
        
        // 玩家运动数据
        let playerY = GROUND_Y;
        let playerVy = 0;
        let isJumping = false;
        
        // 障碍物数组: 每个障碍物 { x: 坐标 }
        let obstacles = [];
        
        // 是否允许生成障碍物 (玩家落地稳定后)
        let canSpawn = false;
        let nextSpawnX = W;          // 下一个障碍物生成的 x 坐标
        
        // 用于时间步长 (秒)
        let lastTimestamp = 0;
        
        // ---------- 辅助函数 ----------
        function draw() {
            ctx.clearRect(0, 0, W, H);
            
            // 1. 画地面参考线 (灰色区域)
            ctx.fillStyle = "#3a3f5e";
            ctx.fillRect(0, GROUND_Y + PLAYER_H - 8, W, 8);
            ctx.fillStyle = "#2a2e45";
            ctx.fillRect(0, GROUND_Y + PLAYER_H - 4, W, 4);
            
            // 2. 画障碍物 (红色)
            for(let obs of obstacles) {
                ctx.fillStyle = "#e34234";
                ctx.shadowBlur = 0;
                ctx.fillRect(obs.x, GROUND_Y + PLAYER_H - OBSTACLE_H, OBSTACLE_W, OBSTACLE_H);
                // 加一点高光
                ctx.fillStyle = "#ff6b5b";
                ctx.fillRect(obs.x+4, GROUND_Y + PLAYER_H - OBSTACLE_H + 4, OBSTACLE_W-8, 6);
            }
            
            // 3. 画玩家 (绿色方块 + 眼睛)
            const playerX = W/2 - PLAYER_W/2;
            ctx.fillStyle = "#6fbf4c";
            ctx.shadowBlur = 6;
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.fillRect(playerX, playerY, PLAYER_W, PLAYER_H);
            // 眼睛
            ctx.fillStyle = "white";
            ctx.fillRect(playerX+8, playerY+10, 8, 8);
            ctx.fillRect(playerX+24, playerY+10, 8, 8);
            ctx.fillStyle = "#1e2a2e";
            ctx.fillRect(playerX+10, playerY+12, 4, 5);
            ctx.fillRect(playerX+26, playerY+12, 4, 5);
            ctx.shadowBlur = 0;
            
            // 4. 游戏结束蒙层
            if(!gameRunning) {
                ctx.fillStyle = "rgba(0,0,0,0.75)";
                ctx.fillRect(0, 0, W, H);
                ctx.font = "bold 34px 'Segoe UI', system-ui";
                ctx.fillStyle = "#f2c94c";
                ctx.shadowBlur = 0;
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", W/2, H/2 - 40);
                ctx.font = "20px 'Segoe UI'";
                ctx.fillStyle = "#dddddd";
                ctx.fillText("点击画面 或 按「重新开始」", W/2, H/2 + 30);
                ctx.font = "16px monospace";
                ctx.fillStyle = "#aaaaaa";
                ctx.fillText("得分: " + Math.floor(score), W/2, H/2 + 80);
                ctx.textAlign = "left";
            }
            
            // 显示得分 (右上)
            ctx.font = "bold 22px 'Segoe UI'";
            ctx.fillStyle = "#ffdd99";
            ctx.shadowBlur = 0;
            ctx.fillText("⚡ "+Math.floor(score), W-90, 50);
        }
        
        // 生成障碍物在指定x坐标
        function spawnObstacle(x) {
            obstacles.push({ x: x });
        }
        
        // 重置整个游戏
        function resetGame() {
            gameRunning = true;
            score = 0;
            playerY = GROUND_Y;
            playerVy = 0;
            isJumping = false;
            obstacles = [];
            canSpawn = false;
            nextSpawnX = W;
            
            // 确保生成第一个障碍物前玩家稳定
            // 标志会在更新循环中满足条件时打开
        }
        
        // 尝试跳跃 (仅当游戏中且在地面时)
        function attemptJump() {
            if(!gameRunning) return;
            // 只有在地面且未上升/下降时才能跳 (防止空中二段跳)
            if(!isJumping && playerY >= GROUND_Y - 1 && playerVy === 0) {
                playerVy = JUMP_POWER;
                isJumping = true;
                // 轻微提高一点 y 避免卡地面
                playerY = GROUND_Y - 1;
            }
        }
        
        // 更新游戏逻辑 (dt 秒)
        function updateGame(dt) {
            if(!gameRunning) return;
            
            // ----- 1. 玩家跳跃物理 -----
            if(isJumping) {
                playerVy += GRAVITY * dt;
                playerY += playerVy * dt;
                // 落地检测
                if(playerY >= GROUND_Y) {
                    playerY = GROUND_Y;
                    playerVy = 0;
                    isJumping = false;
                }
                // 天花板限制 (防止飞出顶部)
                if(playerY < 0) {
                    playerY = 0;
                    if(playerVy < 0) playerVy = 0;
                }
            } else {
                // 确保贴地
                if(playerY < GROUND_Y) {
                    playerY += (GROUND_Y - playerY) * 0.2;
                    if(Math.abs(playerY - GROUND_Y) < 0.5) playerY = GROUND_Y;
                }
            }
            
            // ----- 2. 允许生成障碍物的时机: 玩家站在地面且没跳跃 -----
            if(!canSpawn && !isJumping && Math.abs(playerY - GROUND_Y) < 1) {
                canSpawn = true;
                // 生成第一个障碍物 (在右侧 OBSTACLE_SPACING 距离)
                const firstX = W/2 + OBSTACLE_SPACING;
                spawnObstacle(firstX);
                nextSpawnX = firstX + OBSTACLE_SPACING;
            }
            
            // ----- 3. 移动障碍物并移除超出屏幕 -----
            for(let i=0; i<obstacles.length; i++) {
                obstacles[i].x -= OBSTACLE_SPEED * dt;
            }
            obstacles = obstacles.filter(obs => obs.x + OBSTACLE_W > 0);
            
            // ----- 4. 生成后续障碍物 (保持固定间距)-----
            if(canSpawn) {
                if(obstacles.length === 0) {
                    // 没有障碍物时直接生成一个在右侧远处
                    let newX = W;
                    spawnObstacle(newX);
                    nextSpawnX = newX + OBSTACLE_SPACING;
                } else {
                    // 取最后一个障碍物 (最靠右的)
                    let lastObs = obstacles[obstacles.length-1];
                    if(lastObs.x <= nextSpawnX - OBSTACLE_SPACING) {
                        spawnObstacle(nextSpawnX);
                        nextSpawnX += OBSTACLE_SPACING;
                    }
                }
            }
            
            // ----- 5. 得分: 根据通过的障碍物数量 (障碍物 x + 宽 < 玩家中心时加分)-----
            // 为了避免重复加分, 用标记，但简单起见：每帧检测障碍物是否移过玩家并且未被计数。但容易多次计分。
            // 更可靠: 用一个数组标记已计分障碍物, 为了代码简洁, 我们用“障碍物x+宽度 < 玩家左侧”时一次性加分。
            // 由于性能简单, 这里维护一个静态 Set 不现实，简单实现: 每帧只对未计分的障碍物判断。
            // 为了稳妥且干净，使用每个障碍物对象添加属性 counted。
            for(let obs of obstacles) {
                if(!obs.counted && (obs.x + OBSTACLE_W) < (W/2 - PLAYER_W/2)) {
                    obs.counted = true;
                    score += 10;
                }
            }
            
            // ----- 6. 碰撞检测 (矩形重叠)-----
            const playerLeft = W/2 - PLAYER_W/2;
            const playerRight = playerLeft + PLAYER_W;
            const playerTop = playerY;
            const playerBottom = playerY + PLAYER_H;
            
            for(let obs of obstacles) {
                const obsLeft = obs.x;
                const obsRight = obs.x + OBSTACLE_W;
                const obsTop = GROUND_Y + PLAYER_H - OBSTACLE_H;
                const obsBottom = GROUND_Y + PLAYER_H;
                
                if(playerRight > obsLeft && playerLeft < obsRight &&
                   playerBottom > obsTop && playerTop < obsBottom) {
                    gameRunning = false;
                    break;
                }
            }
        }
        
        // ---------- 游戏循环 (基于 requestAnimationFrame) ----------
        let lastTime = 0;
        function gameLoop(nowMs) {
            requestAnimationFrame(gameLoop);
            if(!lastTime) { lastTime = nowMs; return; }
            let dt = Math.min(0.033, (nowMs - lastTime) / 1000);
            if(dt <= 0) { lastTime = nowMs; return; }
            
            updateGame(dt);
            draw();
            
            lastTime = nowMs;
        }
        
        // ---------- 事件绑定 (支持鼠标/触屏/键盘) ----------
        function bindEvents() {
            // 点击canvas触发跳跃
            canvas.addEventListener('click', (e) => {
                e.preventDefault();
                if(!gameRunning) {
                    resetGame();
                } else {
                    attemptJump();
                }
            });
            // 触屏设备同样支持 touchstart
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if(!gameRunning) {
                    resetGame();
                } else {
                    attemptJump();
                }
            });
            // 键盘空格跳跃
            window.addEventListener('keydown', (e) => {
                if(e.code === 'Space' || e.code === 'ArrowUp') {
                    e.preventDefault();
                    if(!gameRunning) {
                        resetGame();
                    } else {
                        attemptJump();
                    }
                }
                // 按 R 键重新开始
                if(e.code === 'KeyR') {
                    e.preventDefault();
                    resetGame();
                }
            });
            // 按钮事件
            document.getElementById('jumpBtn').addEventListener('click', () => {
                if(!gameRunning) resetGame();
                else attemptJump();
            });
            document.getElementById('restartBtn').addEventListener('click', () => {
                resetGame();
            });
        }
        
        // 初始化游戏
        function init() {
            resetGame();
            bindEvents();
            // 启动循环
            lastTime = 0;
            requestAnimationFrame(gameLoop);
        }
        
        init();
    })();
</script>
</body>
</html>
